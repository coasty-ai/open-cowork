<svg width="1200" height="340" viewBox="0 0 1200 340" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="open-cowork — a cross-platform agentic coworker on the Coasty Computer Use API">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="340" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0a0e14"/>
      <stop offset="1" stop-color="#0f1729"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#38bdf8"/>
      <stop offset="0.5" stop-color="#22d3ee"/>
      <stop offset="1" stop-color="#34d399"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#22d3ee" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="screen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#172339"/>
      <stop offset="1" stop-color="#0d1422"/>
    </linearGradient>
  </defs>

  <!-- backdrop -->
  <rect width="1200" height="340" rx="20" fill="url(#bg)"/>
  <rect x="0.5" y="0.5" width="1199" height="339" rx="19.5" fill="none" stroke="#1f2a37"/>
  <circle cx="980" cy="180" r="260" fill="url(#glow)"/>

  <!-- left: wordmark + value prop -->
  <g transform="translate(64,84)">
    <!-- dot mark -->
    <circle cx="13" cy="10" r="13" fill="url(#accent)"/>
    <circle cx="13" cy="10" r="6" fill="#0a0e14"/>

    <text x="40" y="20" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif" font-size="44" font-weight="800" letter-spacing="-1" fill="url(#accent)">open-cowork</text>

    <text x="2" y="74" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif" font-size="22" font-weight="600" fill="#e6edf3">Hand off computer tasks to an AI coworker.</text>
    <text x="2" y="104" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif" font-size="22" font-weight="600" fill="#8b98a5">Watch it work. Approve from anywhere.</text>

    <!-- platform chips -->
    <g font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif" font-size="14" font-weight="600">
      <g transform="translate(0,134)">
        <rect width="104" height="30" rx="15" fill="#0e1726" stroke="#22d3ee" stroke-opacity="0.4"/>
        <text x="52" y="20" text-anchor="middle" fill="#7dd3fc">Desktop</text>
      </g>
      <g transform="translate(116,134)">
        <rect width="72" height="30" rx="15" fill="#0e1726" stroke="#34d399" stroke-opacity="0.4"/>
        <text x="36" y="20" text-anchor="middle" fill="#6ee7b7">Web</text>
      </g>
      <g transform="translate(200,134)">
        <rect width="92" height="30" rx="15" fill="#0e1726" stroke="#a78bfa" stroke-opacity="0.4"/>
        <text x="46" y="20" text-anchor="middle" fill="#c4b5fd">Mobile</text>
      </g>
    </g>

    <text x="2" y="196" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif" font-size="14" font-weight="500" fill="#5b6675">Powered by the Coasty Computer Use API · one key, zero spend in demo mode</text>
  </g>

  <!-- right: a little "agent driving a screen" motif -->
  <g transform="translate(828,86)">
    <rect width="300" height="190" rx="14" fill="url(#screen)" stroke="#243247"/>
    <!-- title bar -->
    <rect x="1" y="1" width="298" height="34" rx="13" fill="#0e1726"/>
    <circle cx="22" cy="18" r="5" fill="#f87171"/>
    <circle cx="40" cy="18" r="5" fill="#fbbf24"/>
    <circle cx="58" cy="18" r="5" fill="#34d399"/>
    <rect x="92" y="11" width="170" height="14" rx="7" fill="#1b2740"/>

    <!-- live badge -->
    <g transform="translate(214,48)">
      <rect width="70" height="22" rx="11" fill="#10241c" stroke="#34d399" stroke-opacity="0.5"/>
      <circle cx="16" cy="11" r="4" fill="#34d399"/>
      <text x="30" y="15" font-family="ui-sans-serif, system-ui, Segoe UI, Roboto, sans-serif" font-size="11" font-weight="700" fill="#6ee7b7">LIVE</text>
    </g>

    <!-- event timeline lines -->
    <g>
      <rect x="24" y="58" width="150" height="10" rx="5" fill="#1b2740"/>
      <rect x="24" y="80" width="120" height="10" rx="5" fill="#1b2740"/>
      <rect x="24" y="102" width="170" height="10" rx="5" fill="#22324d"/>
      <rect x="24" y="124" width="96" height="10" rx="5" fill="#1b2740"/>
    </g>

    <!-- cursor -->
    <g transform="translate(196,120)">
      <path d="M0 0 L0 26 L7 19 L12 30 L17 28 L12 17 L22 17 Z" fill="#e6edf3" stroke="#0a0e14" stroke-width="1.5"/>
    </g>

    <!-- cost pill -->
    <g transform="translate(24,150)">
      <rect width="86" height="24" rx="12" fill="#0e1726" stroke="#243247"/>
      <text x="43" y="16" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12" font-weight="700" fill="#7dd3fc">$0.05</text>
    </g>
    <g transform="translate(120,150)">
      <rect width="120" height="24" rx="12" fill="#10241c" stroke="#34d399" stroke-opacity="0.4"/>
      <text x="60" y="16" text-anchor="middle" font-family="ui-sans-serif, system-ui, Segoe UI, sans-serif" font-size="12" font-weight="700" fill="#6ee7b7">succeeded ✓</text>
    </g>
  </g>
</svg>
