packages:
  - packages/*
  - apps/*
  - tools/*
  - e2e

# Dependencies that are allowed to run postinstall build scripts (pnpm 10 blocks by default)
onlyBuiltDependencies:
  - electron
  - esbuild

catalog:
  typescript: ^5.7.2
  tsx: ^4.19.2
  vitest: ^3.0.5
  '@vitest/coverage-v8': ^3.0.5
  '@types/node': ^22.10.2
  fastify: ^5.2.0
  '@fastify/cors': ^10.0.1
  zod: ^3.24.1
  react: 19.0.0
  react-dom: 19.0.0
  '@types/react': ^19.0.2
  '@types/react-dom': ^19.0.2
  vite: ^6.0.7
  '@vitejs/plugin-react': ^4.3.4
  jsdom: ^25.0.1
  '@testing-library/react': ^16.1.0
  '@testing-library/user-event': ^14.5.2
  '@testing-library/jest-dom': ^6.6.3
  zustand: ^5.0.2
  react-router-dom: ^7.1.1
  electron: ^33.2.1
  esbuild: ^0.24.2
  '@playwright/test': ^1.49.1
  playwright-core: ^1.49.1
